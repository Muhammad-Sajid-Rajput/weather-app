services:
  - type: web
    name: climatex
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEATHER_API_KEY
        sync: false
      - key: PORT
        value: 5000
